<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemesanan Makanan</title>
    <link rel="stylesheet" href="css/landing_page.css">
</head>
<body>

<div class="app-container">

    <header class="header">
        <div class="top-bar">
            <div class="menu-icon">
                <span></span>
                <span></span>
            </div>
            <div class="profile-pic"></div>
        </div>
        <h1 id="user-greeting">Hallo Pelanggan !</h1>
        <p class="subtitle">apa yang ingin Anda makan hari ini?</p>
    </header>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Cari makanan favoritmu..." id="search-food">
        <button class="search-btn" onclick="jalankanPencarian()">
            <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </button>
    </div>

    <div class="food-grid" id="product-grid">
        <p style="grid-column: span 2; text-align:center; color:#1a0f08; font-weight:600;">Memuat menu...</p>
    </div>

    <footer class="bottom-nav">
        <div class="nav-item">
            <svg viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Home</span>
        </div>
        
        <div class="nav-item">
            <svg viewBox="0 0 24 24">
                <rect x="6" y="7" width="12" height="12" rx="2"></rect>
                <path d="M9 7V5a3 3 0 0 1 6 0v2"></path>
            </svg>
            <span>Cart</span>
        </div>
        
        <div class="nav-item">
            <svg viewBox="0 0 24 24">
                <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                <line x1="9" y1="9" x2="15" y2="9"></line>
                <line x1="9" y1="13" x2="15" y2="13"></line>
                <line x1="9" y1="17" x2="13" y2="17"></line>
            </svg>
            <span>Orders</span>
        </div>
        
        <div class="nav-item active" onclick="logout()" style="cursor: pointer;">
    <svg viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
    </svg>
    <span>Logout</span>
</div>
    </footer>
</div>

<script src="js/script_landing.js"></script>

</body>
</html>
